# Paste this `handle` block into the existing site block in
# /etc/caddy/Caddyfile, ABOVE `file_server` — Caddyfile matchers are
# order-sensitive, and a `handle` placed after `file_server` never fires
# because `file_server` already answers every request.
#
# Resulting block, in order:
#
#   blog.example.com {
#       root * /var/www/blog
#
#       handle /api/* {              <-- this file's contents go here
#           request_body {
#               max_size 16KB
#           }
#           reverse_proxy 127.0.0.1:8787
#       }
#
#       file_server
#       encode gzip
#   }
#
# blog-api binds 127.0.0.1 only, so it's reachable exclusively through
# Caddy; same-origin proxying also means no CORS setup is needed in prod.
# The request_body cap keeps oversized POSTs (comments/contact) from
# reaching blog-api as a cheap DoS vector.

handle /api/* {
    request_body {
        max_size 16KB
    }
    reverse_proxy 127.0.0.1:8787
}
